<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .success-card { background: #ffffff; width: 100%; max-width: 400px; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        h1 { color: #28a745; margin-bottom: 1rem; }
        p { color: #666; margin-bottom: 2rem; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #007bff; color: white; text-decoration: none; border-radius: 6px; font-weight: bold; transition: background 0.3s; }
        .btn:hover { background-color: #0056b3; }
        .checkmark { font-size: 3rem; color: #28a745; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>

    <div class="success-card">
        <span class="checkmark">✓</span>
        <h1>Payment Successful</h1>
        <p>Your order has been placed successfully. Thank you for shopping with us!</p>
        
        <a href="/my_orders" class="btn">View My Orders</a>
    </div>

</body>
</html>
