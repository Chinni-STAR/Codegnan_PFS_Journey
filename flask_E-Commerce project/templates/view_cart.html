<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 40px 20px; }
        .container { background: #ffffff; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 25px; }
        th { background-color: #f8f9fa; text-align: left; padding: 15px; border-bottom: 2px solid #ddd; }
        td { padding: 15px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .product-img { border-radius: 6px; }
        .total-row { font-size: 1.2rem; font-weight: bold; }
        
        .btn { padding: 10px 20px; text-decoration: none; border-radius: 6px; font-size: 0.95rem; font-weight: bold; display: inline-block; }
        .btn-checkout { background-color: #28a745; color: white; }
        .btn-continue { background-color: #6c757d; color: white; }
        .btn-remove { background-color: #dc3545; color: white; padding: 6px 12px; font-size: 0.8rem; }
        
        .alert { padding: 15px; background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; border-radius: 6px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Cart</h2>

    {% if cart %}
        <table>
            <thead>
                <tr>
                    <th>Image</th>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for item in cart %}
                <tr>
                    <td><img src="{{ url_for('static', filename='images/' + item.image) }}" width="70" class="product-img"></td>
                    <td>{{ item.name }}</td>
                    <td>₹{{ item.price }}</td>
                    <td>
                        <a href="{{ url_for('remove_cart', product_id=item.id) }}" class="btn btn-remove">Remove</a>
                    </td>
                </tr>
                {% endfor %}
                <tr class="total-row">
                    <td colspan="2">Total</td>
                    <td colspan="2">₹{{ total }}</td>
                </tr>
            </tbody>
        </table>

        <div>
            <a href="/checkout" class="btn btn-checkout">Proceed To Payment</a>
            <a href="/user_dashboard" class="btn btn-continue">Continue Shopping</a>
        </div>

    {% else %}
        <div class="alert">Your cart is empty.</div>
        <a href="/user_dashboard" class="btn btn-continue">Continue Shopping</a>
    {% endif %}
</div>

</body>
</html>
