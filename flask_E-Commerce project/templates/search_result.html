<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 40px 20px; }
        .auth-container { background: #ffffff; max-width: 800px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 25px; text-align: center; }
        
        .product-card { display: flex; align-items: center; gap: 20px; padding: 15px; border-bottom: 1px solid #eee; }
        .product-card img { border-radius: 8px; object-fit: cover; }
        .product-info h3 { margin: 0 0 10px 0; color: #333; }
        .product-info p { margin: 0 0 10px 0; font-weight: bold; color: #28a745; }
        
        .view-link { padding: 8px 16px; background-color: #007bff; color: white; text-decoration: none; border-radius: 6px; font-size: 0.9rem; }
        .view-link:hover { background-color: #0056b3; }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #007bff; text-decoration: none; }
        .no-results { text-align: center; color: #777; padding: 20px; }
    </style>
</head>
<body>

<div class="auth-container">
    <h2>Search Results</h2>

    {% if products %}
        {% for product in products %}
            <div class="product-card">
                <img src="{{ url_for('static', filename='images/' + product[4]) }}" alt="{{ product[1] }}" width="120" height="120">
                <div class="product-info">
                    <h3>{{ product[1] }}</h3>
                    <p>₹ {{ product[3] }}</p>
                    <a href="/user_view_item/{{ product[0] }}" class="view-link">View Details</a>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <h3 class="no-results">No Products Found</h3>
    {% endif %}

    <a href="/user_dashboard" class="back-link">← Back to Dashboard</a>
</div>

</body>
</html>
