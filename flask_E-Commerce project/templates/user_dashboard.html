
<form method="POST" action="/user_search">
    <input type="text"
           name="keyword"
           placeholder="Search Products">

    <button type="submit">
        Search
    </button>
</form>

<br>

<a href="/view_cart">
    <button>
        View Cart
    </button>
</a>

<hr>

{% for product in products %}

<div>

    <img src="{{ url_for('static',
    filename='images/' + product[4]) }}"
    width="150">

    <h3>{{ product[1] }}</h3>

    <p>₹ {{ product[3] }}</p>

    <a href="/user_view_item/{{ product[0] }}">
        View Details
    </a>

    &nbsp;&nbsp;

    <a href="/add_to_cart/{{ product[0] }}">
        <button type="button">
            Add To Cart
        </button>
    </a>

</div>

<hr>

{% endfor %}
