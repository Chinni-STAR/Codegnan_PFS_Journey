<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 40px 20px; }
        .container { background: #ffffff; max-width: 900px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-bottom: 25px; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th { background-color: #f8f9fa; text-align: left; padding: 15px; border-bottom: 2px solid #ddd; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        
        .btn { padding: 8px 12px; text-decoration: none; border-radius: 5px; font-size: 0.85rem; display: inline-block; margin-right: 5px; }
        .btn-view { background-color: #007bff; color: white; }
        .btn-download { background-color: #28a745; color: white; }
        .btn-back { background-color: #6c757d; color: white; margin-top: 10px; }
        
        .alert { padding: 15px; background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>My Orders</h2>

    {% if orders %}
    <table>
        <thead>
            <tr>
                <th>Order ID</th>
                <th>Payment ID</th>
                <th>Total Amount</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for order in orders %}
            <tr>
                <td>{{ order[0] }}</td>
                <td>{{ order[3] }}</td>
                <td>₹{{ order[4] }}</td>
                <td>{{ order[5] }}</td>
                <td>
                    <a href="{{ url_for('invoice', order_id=order[0]) }}" class="btn btn-view">View Invoice</a>
                    <a href="{{ url_for('download_invoice', order_id=order[0]) }}" class="btn btn-download">Download PDF</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
    <div class="alert">No Orders Found</div>
    {% endif %}

    <a href="/user_dashboard" class="btn btn-back">Continue Shopping</a>
</div>

</body>
</html>
