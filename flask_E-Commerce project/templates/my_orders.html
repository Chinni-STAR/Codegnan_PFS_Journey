
<!DOCTYPE html>
<html>
<head>
    <title>My Orders</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2>My Orders</h2>

    <table class="table table-bordered">

        <tr>
            <th>Order ID</th>
            <th>Payment ID</th>
            <th>Total Amount</th>
            <th>Date</th>
        </tr>

        {% for order in orders %}

        <tr>

            <td>{{ order[0] }}</td>

            <td>{{ order[3] }}</td>

            <td>₹{{ order[4] }}</td>

            <td>{{ order[5] }}</td>

        </tr>

        {% endfor %}

    </table>

</div>

</body>
</html>
