<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>E-Commerce Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background: #232f3e !important; }
        .navbar a { color: white !important; font-weight: bold; }
        .footer { margin-top: 50px; padding: 20px; background: #ddd; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="/user_dashboard">MY STORE</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/view_cart">Cart</a>
            <a class="nav-link" href="/my_orders">My Orders</a>
            <a class="nav-link" href="/user_logout">Logout</a>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
