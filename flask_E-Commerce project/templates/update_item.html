<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Product</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 40px 20px; }
        .container { background: #ffffff; max-width: 500px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #333; margin-top: 0; text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        input[type="text"], input[type="number"], textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        
        .image-preview { margin: 15px 0; text-align: center; }
        .image-preview img { border-radius: 8px; border: 1px solid #eee; }
        
        .btn-update { width: 100%; padding: 14px; background-color: #007bff; color: white; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; transition: background 0.3s; }
        .btn-update:hover { background-color: #0056b3; }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-size: 0.9rem; }
        .flash-msg { color: #28a745; text-align: center; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Update Product</h2>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="flash-msg">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="product_name" value="{{ product[1] }}" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" required>{{ product[2] }}</textarea>
            </div>

            <div class="form-group">
                <label>Price (₹)</label>
                <input type="number" step="0.01" name="price" value="{{ product[3] }}" required>
            </div>

            <div class="image-preview">
                <label>Current Image</label>
                {% if product[4] %}
                    <img src="{{ url_for('static', filename='images/' + product[4]) }}" width="150" alt="Product Image">
                {% else %}
                    <p style="font-size: 0.85rem; color: #999;">No Image Available</p>
                {% endif %}
            </div>

            <div class="form-group">
                <label>Change Image</label>
                <input type="file" name="image" accept="image/*">
            </div>

            <button type="submit" class="btn-update">Update Product</button>
        </form>

        <a href="{{ url_for('item_listing') }}" class="back-link">← Back to Product List</a>
    </div>

</body>
</html>
