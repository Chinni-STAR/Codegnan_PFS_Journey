<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
</head>
<body>

{% with messages = get_flashed_messages() %}
    {% if messages %}
        {% for message in messages %}
            <p style="color:green;">
                {{ message }}
            </p>
        {% endfor %}
    {% endif %}
{% endwith %}

<h2>User Login</h2>

<form method="POST">

    <input type="email"
           name="email"
           placeholder="Enter Email"
           required><br><br>

    <input type="password"
           name="password"
           placeholder="Enter Password"
           required><br><br>

    <button type="submit">
        Login
    </button>

</form>

<a href="/user_signup">Create Account</a>

</body>
</html>
