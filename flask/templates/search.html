<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Search</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#667eea,#764ba2);
    padding:30px;
}

.container{
    width:100%;
    max-width:1000px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:36px;
}

.search-box{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    width:70%;
    padding:14px;
    border:none;
    border-radius:10px;
    outline:none;
    font-size:16px;
}

.search-box button{
    padding:14px 25px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

.search-box button:hover{
    background:#0072ff;
    transform:translateY(-2px);
}

.message{
    text-align:center;
    color:#fff;
    font-size:18px;
    margin-bottom:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:15px;
    background:white;
}

table th{
    background:#4f46e5;
    color:white;
    padding:15px;
    font-size:17px;
}

table td{
    padding:12px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

table tr:hover{
    background:#f3f4f6;
    transition:0.3s;
}

@media(max-width:768px){
    .search-box{
        flex-direction:column;
    }

    .search-box input{
        width:100%;
    }

    table{
        font-size:14px;
    }
}
</style>
</head>
<body>

<div class="container">

    <h1>🎓 Student Search Portal</h1>

    <form method="POST" class="search-box">
        <input type="text" name="keyword" placeholder="🔍 Enter Student Name">
        <button type="submit">Search</button>
    </form>

    {% if message %}
        <div class="message">{{ message }}</div>
    {% endif %}

    {% if results %}
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Course</th>
        </tr>

        {% for row in results %}
        <tr>
            <td>{{ row.id }}</td>
            <td>{{ row.name }}</td>
            <td>{{ row.email }}</td>
            <td>{{ row.phone }}</td>
            <td>{{ row.course }}</td>
        </tr>
        {% endfor %}
    </table>
    {% endif %}

</div>

</body>
</html>
