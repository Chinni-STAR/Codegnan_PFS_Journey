<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us - OTP Verification</title>
    <style>
        /* Reset margins and set a clean background */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The main white card container */
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #2c3e50;
            margin-top: 0;
            font-size: 28px;
        }

        p {
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Styling specifically for the OTP display area */
        .otp-container {
            background-color: #e3f2fd;
            border: 2px dashed #2196f3;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .otp-label {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .otp-number {
            font-size: 36px;
            font-weight: bold;
            color: #1976d2;
            letter-spacing: 8px;
        }

        /* Styling the link to look like a button */
        .btn {
            display: inline-block;
            background-color: #2c3e50;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #1a252f;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>About Us</h1>
        <p>Welcome to our secure platform. Please use the code below to verify your session.</p>
        
        <div class="otp-container">
            <div class="otp-label">Your Secure OTP</div>
            <div class="otp-number">{{ otp_number }}</div>
        </div>

        <a href="/" class="btn">Return to Home</a>
    </div>

</body>
</html>
