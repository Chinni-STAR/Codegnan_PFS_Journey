<!DOCTYPE html>
<html>
<head>
    <title>Update Note</title>
</head>
<body>

    <h2>Update Note</h2>

    <form method="POST">

        <label>Title</label>

        <br>

        <input
            type="text"
            name="title"
            value="{{ note.title }}"
            required
        >

        <br><br>

        <label>Content</label>

        <br>

        <textarea
            name="content"
            rows="5"
            cols="40"
            required>{{ note.content }}</textarea>

        <br><br>

        <input
            type="submit"
            value="Update Note"
        >

    </form>

    <br>

    <a href="/view_notes">
        Back to Notes
    </a>

</body>
</html>
